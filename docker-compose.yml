services:
  jupyterlab:
    build: ./docker
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-lean4dev}
    command: >
      jupyter lab --ip=0.0.0.0 --port=8888
        --no-browser --allow-root
        --NotebookApp.token=${JUPYTER_TOKEN:-lean4dev}
